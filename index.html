<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>입력 사이트</title>
  <link rel="stylesheet" href="sender.css">
</head>
<body>
  <main>
    <header>
      <h1>입력 사이트</h1>
      <p class="subtitle">두 칸에 글자를 입력하고 확인을 누르면 다른 URL의 받는 사이트로 전송됩니다.</p>
    </header>

    <form id="sendForm">
      <div class="form-head">
        <h2>보낼 글자 입력</h2>
      </div>

      <div class="grid">
        <section>
          <label for="textOne">첫 번째 글자</label>
          <textarea id="textOne" placeholder="첫 번째로 보낼 글자를 입력하세요."></textarea>
        </section>

        <section>
          <label for="textTwo">두 번째 글자</label>
          <textarea id="textTwo" placeholder="두 번째로 보낼 글자를 입력하세요."></textarea>
        </section>
      </div>

      <div class="actions">
        <div class="status" id="status" aria-live="polite"></div>
        <button type="submit">확인</button>
      </div>
    </form>
  </main>

  <script src="sender.js"></script>
</body>
</html>
